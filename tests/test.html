<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script defer
        src="https://code.jquery.com/jquery-4.0.0.slim.min.js"
        integrity="sha384-tcspKDb5tWvyRCOWzevlAeQgHeEzYdUHJpcgnIhcP9w4CnfD7DLAcS+k9QzLbRJO"
        crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/x_ite@latest/dist/x_ite.min.js"></script>
    <script defer src="../dist/x_ite-spz-parser.js"></script>
    <script type="module">
$("#view-all") .on ("click", () =>
{
  X3D .getBrowser () .viewAll ();
});

$("#file-input") .on ("change", (event) =>
{
  const file = event .target .files [0];

  if (file)
  {
    const reader = new FileReader ();

    reader .onload = (event) =>
    {
      const content = event .target .result;

      X3D .getBrowser () .loadURL (new X3D .MFString (`data:model/spz;base64,${btoa (content)}`));
    };

    reader .readAsText (file);
  }
});
    </script>
    <style>
:root {
  color-scheme: light dark;
}

body {
  background: light-dark(rgb(255, 255, 255), rgb(27, 27, 30));
  font-family: system-ui, sans-serif;
}

x3d-canvas {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 19 / 9;
}
    </style>
  </head>
  <body>
<h1>SPZ File Test Page</h1>
<x3d-canvas id="x3d-canvas" src="AR-Code-1760587744027.spz" debug="true"></x3d-canvas>
<br>
<button id="view-all">View All</button> <input type="file" id="file-input" accept=".off">

  </body>
</html>
